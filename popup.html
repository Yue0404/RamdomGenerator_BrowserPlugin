<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Generator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>__MSG_appTitle__</h1>
      <button class="btn-settings" id="btn-settings" title="__MSG_settings__">⚙️</button>
    </header>

    <!-- ======== Main View ======== -->
    <div class="main-view" id="main-view">

      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="decimal">__MSG_tabDecimal__</button>
        <button class="tab" data-tab="integer">__MSG_tabInteger__</button>
        <button class="tab" data-tab="password">__MSG_tabPassword__</button>
        <button class="tab" data-tab="rgb">__MSG_tabRgb__</button>
        <button class="tab" data-tab="sequence">__MSG_tabSequence__</button>
      </nav>

      <div class="tab-content">

        <!-- 1. Decimal -->
        <section class="panel active" id="panel-decimal">
          <div class="setting">
            <label for="dec-places">__MSG_labelDecimalPlaces__</label>
            <input type="number" id="dec-places" value="3" min="1" max="32">
            <span class="error-hint" data-for="dec-places"></span>
          </div>
          <div class="output-area">
            <label for="dec-result">__MSG_labelResult__</label>
            <input type="text" id="dec-result" readonly>
          </div>
        </section>

        <!-- 2. Integer -->
        <section class="panel" id="panel-integer">
          <div class="setting row">
            <div>
              <label for="int-min">__MSG_labelIntMin__</label>
              <input type="number" id="int-min" value="0">
              <span class="error-hint" data-for="int-min"></span>
            </div>
            <div>
              <label for="int-max">__MSG_labelIntMax__</label>
              <input type="number" id="int-max" value="100">
              <span class="error-hint" data-for="int-max"></span>
            </div>
          </div>
          <button class="swap-btn" id="swap-int">__MSG_btnSwap__</button>
          <span class="warn-hint" data-for="int-pair"></span>
          <div class="output-area">
            <label for="int-result">__MSG_labelResult__</label>
            <input type="text" id="int-result" readonly>
          </div>
        </section>

        <!-- 3. Password -->
        <section class="panel" id="panel-password">
          <div class="setting">
            <label for="pwd-length">__MSG_labelPwdLength__</label>
            <input type="number" id="pwd-length" value="16" min="6" max="128">
            <span class="error-hint" data-for="pwd-length"></span>
          </div>
          <div class="setting checkboxes">
            <label><input type="checkbox" id="pwd-upper" checked> __MSG_labelPwdUpper__</label>
            <label><input type="checkbox" id="pwd-lower" checked> __MSG_labelPwdLower__</label>
            <label><input type="checkbox" id="pwd-digit" checked> __MSG_labelPwdDigit__</label>
            <label><input type="checkbox" id="pwd-special" checked> __MSG_labelPwdSpecial__</label>
          </div>
          <div class="output-area output-row">
            <label for="pwd-result">__MSG_labelResult__</label>
            <input type="text" id="pwd-result" readonly>
            <button class="copy-mini" id="btn-toggle-pwd" title="__MSG_btnTogglePwdTitle__">👁️</button>
          </div>
          <p class="warn-hint" id="hint-pwd-history" style="margin-top:8px">__MSG_hintPwdHistory__</p>
        </section>

        <!-- 4. Color -->
        <section class="panel" id="panel-rgb">
          <div class="color-preview" id="color-preview"></div>
          <p class="warn-hint" data-for="color-similar"></p>
          <div class="color-advanced" id="color-advanced">
            <label class="alpha-random-row"><input type="checkbox" id="chk-random-alpha"> __MSG_chkRandomAlpha__</label>
            <div class="alpha-block" id="alpha-block">
              <div class="opacity-slider">
                <label for="alpha-range">__MSG_labelOpacity__</label>
                <input type="range" id="alpha-range" min="0" max="100" value="100">
                <input type="number" id="alpha-input" min="0" max="100" value="100">
                <span class="error-hint" data-for="alpha-input"></span>
              </div>
              <div class="alpha-tools">
                <button class="lock-btn" id="btn-lock-alpha" title="__MSG_lockAlphaTitleUnlocked__">__MSG_btnLockAlphaUnlocked__</button>
                <label class="alpha-check"><input type="checkbox" id="chk-show-alpha"> __MSG_chkShowAlpha__</label>
              </div>
            </div>
          </div>
          <div class="output-area output-row" id="row-hex">
            <label for="hex-result">__MSG_labelHex__</label>
            <input type="text" id="hex-result" readonly>
            <button class="copy-mini" data-copy="hex" title="__MSG_titleCopyHex__">📋</button>
          </div>
          <div class="output-area output-row" id="row-rgb">
            <label for="rgb-result">__MSG_labelRgb__</label>
            <input type="text" id="rgb-result" readonly>
            <button class="copy-mini" data-copy="rgb" title="__MSG_titleCopyRgb__">📋</button>
          </div>
          <div class="output-area output-row" id="row-hsl">
            <label for="hsl-result">__MSG_labelHsl__</label>
            <input type="text" id="hsl-result" readonly>
            <button class="copy-mini" data-copy="hsl" title="__MSG_titleCopyHsl__">📋</button>
          </div>
          <div class="output-area output-row" id="row-lab">
            <label for="lab-result">__MSG_labelLab__</label>
            <input type="text" id="lab-result" readonly>
            <button class="copy-mini" data-copy="lab" title="__MSG_titleCopyLab__">📋</button>
          </div>
          <div class="output-area output-row" id="row-cmyk">
            <label for="cmyk-result">__MSG_labelCmyk__</label>
            <input type="text" id="cmyk-result" readonly>
            <button class="copy-mini" data-copy="cmyk" title="__MSG_titleCopyCmyk__">📋</button>
          </div>
        </section>

        <!-- 5. Sequence -->
        <section class="panel" id="panel-sequence">
          <div class="setting">
            <label for="seq-count">__MSG_labelSeqCount__</label>
            <input type="number" id="seq-count" value="5" min="1" max="1024">
            <span class="error-hint" data-for="seq-count"></span>
          </div>
          <div class="setting">
            <label for="seq-type">__MSG_labelSeqType__</label>
            <select id="seq-type">
              <option value="decimal">__MSG_seqTypeDecimal__</option>
              <option value="integer">__MSG_seqTypeInteger__</option>
            </select>
          </div>
          <div class="setting seq-decimal-config">
            <label for="seq-dec-places">__MSG_labelSeqDecPlaces__</label>
            <input type="number" id="seq-dec-places" value="3" min="1" max="32">
            <span class="error-hint" data-for="seq-dec-places"></span>
          </div>
          <div class="setting row seq-integer-config" style="display:none">
            <div>
              <label for="seq-int-min">__MSG_labelIntMin__</label>
              <input type="number" id="seq-int-min" value="0">
              <span class="error-hint" data-for="seq-int-min"></span>
            </div>
            <div>
              <label for="seq-int-max">__MSG_labelIntMax__</label>
              <input type="number" id="seq-int-max" value="100">
              <span class="error-hint" data-for="seq-int-max"></span>
            </div>
          </div>
          <button class="swap-btn" id="swap-seq-int">__MSG_btnSwap__</button>
          <span class="warn-hint" data-for="seq-int-pair"></span>
          <div class="output-area">
            <label for="seq-result">__MSG_labelResult__</label>
            <input type="text" id="seq-result" readonly>
          </div>
        </section>
      </div>

      <footer id="footer">
        <button class="btn btn-primary" id="btn-generate">__MSG_btnGenerate__</button>
        <button class="btn btn-secondary" id="btn-copy">__MSG_btnCopy__</button>
      </footer>

    </div><!-- /main-view -->

    <!-- ======== Settings View ======== -->
    <div class="settings-view" id="settings-view">
      <div class="settings-scroll">
      <h2>__MSG_settingsTitle__</h2>

      <div class="settings-section">
        <h3>__MSG_sectionTheme__</h3>
        <div class="color-presets" id="color-presets">
          <button class="color-preset" data-color="purple"  style="background:#6366f1" title="Purple"></button>
          <button class="color-preset" data-color="blue"    style="background:#3b82f6" title="Blue"></button>
          <button class="color-preset" data-color="green"   style="background:#10b981" title="Green"></button>
          <button class="color-preset" data-color="red"     style="background:#ef4444" title="Red"></button>
          <button class="color-preset" data-color="orange"  style="background:#f59e0b" title="Orange"></button>
          <button class="color-preset" data-color="pink"    style="background:#ec4899" title="Pink"></button>
          <button class="color-preset" data-color="cyan"    style="background:#06b6d4" title="Cyan"></button>
          <button class="color-preset" data-color="slate"   style="background:#475569" title="Slate"></button>
        </div>
        <div class="custom-color-row">
          <label for="input-custom-color">__MSG_labelCustomColor__</label>
          <input type="text" id="input-custom-color" placeholder="__MSG_customColorPlaceholder__" maxlength="7">
          <span class="error-hint" data-for="input-custom-color"></span>
        </div>
      </div>

      <div class="settings-section">
        <h3>__MSG_sectionDisplay__<span style="font-weight:400;font-size:12px;color:#9ca3af">__MSG_hintMinTabs__</span></h3>
        <div class="setting checkboxes" id="visibility-toggles">
          <div class="tab-order-row"><label><input type="checkbox" class="tab-vis-toggle" data-tab="decimal" checked> __MSG_tabDecimal__</label><span class="tab-arrows"><button class="arrow-btn arrow-up" data-tab="decimal" title="__MSG_titleArrowUp__">▲</button><button class="arrow-btn arrow-down" data-tab="decimal" title="__MSG_titleArrowDown__">▼</button></span></div>
          <div class="tab-order-row"><label><input type="checkbox" class="tab-vis-toggle" data-tab="integer" checked> __MSG_tabInteger__</label><span class="tab-arrows"><button class="arrow-btn arrow-up" data-tab="integer" title="__MSG_titleArrowUp__">▲</button><button class="arrow-btn arrow-down" data-tab="integer" title="__MSG_titleArrowDown__">▼</button></span></div>
          <div class="tab-order-row"><label><input type="checkbox" class="tab-vis-toggle" data-tab="password" checked> __MSG_tabPassword__</label><span class="tab-arrows"><button class="arrow-btn arrow-up" data-tab="password" title="__MSG_titleArrowUp__">▲</button><button class="arrow-btn arrow-down" data-tab="password" title="__MSG_titleArrowDown__">▼</button></span></div>
          <div class="tab-order-row"><label><input type="checkbox" class="tab-vis-toggle" data-tab="rgb" checked> __MSG_tabRgb__</label><span class="tab-arrows"><button class="arrow-btn arrow-up" data-tab="rgb" title="__MSG_titleArrowUp__">▲</button><button class="arrow-btn arrow-down" data-tab="rgb" title="__MSG_titleArrowDown__">▼</button></span></div>
          <div class="tab-order-row"><label><input type="checkbox" class="tab-vis-toggle" data-tab="sequence" checked> __MSG_tabSequence__</label><span class="tab-arrows"><button class="arrow-btn arrow-up" data-tab="sequence" title="__MSG_titleArrowUp__">▲</button><button class="arrow-btn arrow-down" data-tab="sequence" title="__MSG_titleArrowDown__">▼</button></span></div>
        </div>
        <p class="hint-error" id="hint-min-tabs">__MSG_hintMinTabsError__</p>
      </div>

      <div class="settings-section">
        <h3>__MSG_sectionFeatures__</h3>
        <div class="setting">
          <label for="sel-pwd-security">__MSG_labelPwdSecurity__</label>
          <select id="sel-pwd-security">
            <option value="default">__MSG_pwdSecurityDefault__</option>
            <option value="low">__MSG_pwdSecurityLow__</option>
            <option value="medium">__MSG_pwdSecurityMedium__</option>
            <option value="high">__MSG_pwdSecurityHigh__</option>
          </select>
        </div>
        <div class="setting checkboxes">
          <label><input type="checkbox" id="chk-color-advanced"> __MSG_chkColorAdvanced__</label>
        </div>
      </div>

      <div class="settings-section history-section">
        <div class="history-header">
          <h3>__MSG_sectionHistory__</h3>
          <div class="history-btns">
            <button class="btn-export-history" id="btn-export-history" title="Export JSON">__MSG_btnExport__</button>
            <button class="btn-clear-history" id="btn-clear-history">__MSG_btnClear__</button>
          </div>
        </div>
        <div class="history-list" id="history-list">
          <p class="history-empty">__MSG_historyEmpty__</p>
        </div>
      </div>
      </div><!-- /settings-scroll -->

      <button class="btn btn-primary btn-confirm" id="btn-back">__MSG_btnConfirm__</button>
    </div><!-- /settings-view -->

  </div>

  <script src="popup.js"></script>
</body>
</html>
